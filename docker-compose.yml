services:
  postgres:
    image: postgres:17-alpine
    container_name: todo-playground-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: todo_playground
      POSTGRES_USER: todo_user
      POSTGRES_PASSWORD: todo_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todo_user -d todo_playground"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
